spring:
  application:
    name: clinicai-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/clinicai}
    username: ${DB_USERNAME:clinicai}
    password: ${DB_PASSWORD:clinicai_dev_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: public

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: 5672
    username: ${RABBITMQ_USER:clinicai}
    password: ${RABBITMQ_PASS:clinicai_dev_pass}

jwt:
  secret: ${JWT_SECRET:dev-secret-key-must-be-at-least-32-chars!!}
  expiration: 86400000

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs